<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-3">
    <span class="navbar-brand">My Flask App</span>
    <div>
        {% if session.user %}
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-sm btn-success">Dashboard</a>
            <a href="{{ url_for('main.logout') }}" class="btn btn-sm btn-danger">Logout</a>
        {% else %}
            <a href="{{ url_for('main.login') }}" class="btn btn-sm btn-primary">Login</a>
            <a href="{{ url_for('main.register') }}" class="btn btn-sm btn-warning">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

</body>
</html>
