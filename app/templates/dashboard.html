{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<section class="content">
    <div class="intro">
        <h2>Welcome, {{ user["username"] }}!</h2>
        <p>You are logged in with session-based authentication.</p>
    </div>

    <div class="info-box">
        <p><strong>User ID:</strong> {{ user["id"] }}</p>
        <p><strong>Joined:</strong> {{ user["created_at"] }}</p>
        <p><strong>Database:</strong> SQLite at <code>instance/users.db</code></p>
    </div>
    <a class="button-link" href="{{ url_for('auth.logout') }}">Logout</a>
</section>
{% endblock %}
