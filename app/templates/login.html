<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#dfe3ea;
}

.container{
  width:900px;
  height:500px;
  display:flex;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.left{
  flex:1;
  background:#f4f6f9;
  padding:50px;
}

.logo{
  font-weight:600;
  color:#1e5cc4;
  margin-bottom:30px;
}

.left h2{
  margin-bottom:10px;
}

.left p{
  font-size:14px;
  color:gray;
  margin-bottom:20px;
}

.social{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.social button{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

.divider{
  text-align:center;
  font-size:12px;
  margin:15px 0;
  color:gray;
}

.input-box{
  margin-bottom:15px;
}

.input-box input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

.options{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:15px;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  background:#1e5cc4;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.login-btn:hover{
  background:#174aa0;
}

.bottom{
  margin-top:15px;
  font-size:13px;
}

.bottom a{
  color:#1e5cc4;
  text-decoration:none;
}

.right{
  flex:1;
  background:linear-gradient(135deg,#1e5cc4,#2d7bff);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.right h3{
  margin-top:20px;
}

.signature{
  position:absolute;
  bottom:10px;
  right:20px;
  font-size:12px;
  color:gray;
}
</style>

</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="logo">dotwork</div>

    <h2>Log in to your Account</h2>
    <p>Welcome back! Select method to log in:</p>

    <div class="social">
      <button>Google</button>
      <button>Facebook</button>
    </div>

    <div class="divider">or continue with email</div>

    <form method="POST">
      <div class="input-box">
        <input type="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button class="login-btn">Log in</button>
    </form>

    <div class="bottom">
      Don’t have an account? <a href="/register">Create an account</a>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Connect with every application.</h3>
    <p>Everything you need in an easily customizable dashboard.</p>
  </div>

</div>

<div class="signature">
  Designed by Faiz
</div>

</body>
</html>
