<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#dfe3ea;
}

.container{
  width:900px;
  height:500px;
  display:flex;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* LEFT */
.left{
  flex:1;
  background:#f4f6f9;
  padding:50px;
}

.logo{
  font-weight:600;
  color:#1e5cc4;
  margin-bottom:30px;
}

.left h2{margin-bottom:10px;}
.left p{font-size:14px;color:gray;margin-bottom:20px;}

.input-box{margin-bottom:15px;}

.input-box input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

.options{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:15px;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  background:#1e5cc4;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.login-btn:hover{background:#174aa0;}

.bottom{margin-top:15px;font-size:13px;}
.bottom a{color:#1e5cc4;text-decoration:none;}

/* RIGHT */
.right{
  flex:1;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
}

.bg{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

canvas{
  position:absolute;
  width:100%;
  height:100%;
  z-index:1;
}

.text{
  position:relative;
  z-index:2;
}

/* SIGN */
.signature{
  position:absolute;
  bottom:10px;
  right:20px;
  font-size:12px;
  letter-spacing:2px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
<div class="logo">Flask</div>

<h2>Log in to your Account</h2>
<p>Welcome back! Please login to continue.</p>

<form method="POST">

<div class="input-box">
<input type="email" placeholder="Email" required>
</div>

<div class="input-box">
<input type="password" placeholder="Password" required>
</div>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button class="login-btn">Log in</button>

</form>

<div class="bottom">
Don’t have an account? <a href="/register">Create an account</a>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<img src="{{ url_for('static', filename='bg.jpg') }}" class="bg">

<canvas id="particles"></canvas>

<div class="text">
<h3>Connect with every application.</h3>
<p>Everything you need in an easily customizable dashboard.</p>
</div>

</div>

</div>

<div class="signature">
🅳🅴🆂🅸🅶🅽🅴🅳 🅱🆈 🅵🅰🅸🆉
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let particles = [];
let mouse = {x:null,y:null};

for(let i=0;i<180;i++){
  particles.push({
    baseX: Math.random()*canvas.width,
    baseY: Math.random()*canvas.height,
    angle: Math.random()*Math.PI*2,
    speed: 0.01 + Math.random()*0.02,
    size:1+Math.random()*2,
    color:["#ff00ff","#00ffff","#ffff00","#ffffff"][Math.floor(Math.random()*4)]
  });
}

canvas.addEventListener("mousemove",e=>{
  mouse.x=e.offsetX;
  mouse.y=e.offsetY;
});

canvas.addEventListener("mouseleave",()=>{
  mouse.x=null;
  mouse.y=null;
});

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    
    // smooth floating motion
    p.angle += p.speed;
    let x = p.baseX + Math.cos(p.angle)*3;
    let y = p.baseY + Math.sin(p.angle)*3;

    // mouse effect (soft, no push)
    if(mouse.x !== null){
      let dx = mouse.x - x;
      let dy = mouse.y - y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 100){
        x += dx * 0.02;
        y += dy * 0.02;
      }
    }

    ctx.beginPath();
    ctx.arc(x,y,p.size,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
